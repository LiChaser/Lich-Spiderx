{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">扫描结果</h2>

    <div class="card-box">
        <div class="table-responsive">
            <table class="table table-hover table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>目标 URL</th>
                        <th>成功凭据 (User:Pass)</th>
                        <th>发现时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in results %}
                    <tr id="row-{{ loop.index0 }}">
                        <td>{{ loop.index }}</td>
                        <td><a href="{{ row.url }}" target="_blank">{{ row.url }}</a></td>
                        <td><span class="badge bg-success">{{ row.cred }}</span></td>
                        <td>{{ row.time }}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-danger delete-btn" data-index="{{ loop.index0 }}">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center">暂无数据</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-3 d-flex justify-content-between">
            <button class="btn btn-success" onclick="alert('导出功能演示')"><i class="fas fa-file-excel"></i> 导出 Excel</button>
            <button id="clear-all-btn" class="btn btn-danger"><i class="fas fa-trash-alt"></i> 一键清空所有结果</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    // 单个删除
    $('.delete-btn').click(function() {
        if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) {
            return;
        }
        
        var index = $(this).data('index');
        var row = $('#row-' + index);
        
        $.post('/api/delete_result', { index: index }, function(resp) {
            if (resp.status === 'success') {
                row.fadeOut(300, function() { $(this).remove(); });
            } else {
                alert('删除失败: ' + resp.message);
            }
        }).fail(function() {
            alert('网络错误，删除失败');
        });
    });

    // 一键清空
    $('#clear-all-btn').click(function() {
        if (!confirm('警告：确定要清空所有扫描结果吗？此操作不可恢复！')) {
            return;
        }
        
        $.post('/api/delete_result', { action: 'clear_all' }, function(resp) {
            if (resp.status === 'success') {
                alert('所有结果已清空');
                location.reload(); // 刷新页面
            } else {
                alert('操作失败: ' + resp.message);
            }
        }).fail(function() {
            alert('网络错误，操作失败');
        });
    });
});

// 表格排序功能
function sortTable(n) {
  var table, rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
  table = document.getElementById("resultsTable");
  switching = true;
  // Set the sorting direction to ascending:
  dir = "asc"; 
  /* Make a loop that will continue until
  no switching has been done: */
  while (switching) {
    // Start by saying: no switching is done:
    switching = false;
    rows = table.rows;
    /* Loop through all table rows (except the
    first, which contains table headers): */
    for (i = 1; i < (rows.length - 1); i++) {
      // Start by saying there should be no switching:
      shouldSwitch = false;
      /* Get the two elements you want to compare,
      one from current row and one from the next: */
      x = rows[i].getElementsByTagName("TD")[n];
      y = rows[i + 1].getElementsByTagName("TD")[n];
      
      // Check if rows are empty (no data)
      if (!x || !y) continue;
      
      /* Check if the two rows should switch place,
      based on the direction, asc or desc: */
      if (dir == "asc") {
        if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
          shouldSwitch = true;
          break;
        }
      } else if (dir == "desc") {
        if (x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) {
          shouldSwitch = true;
          break;
        }
      }
    }
    if (shouldSwitch) {
      /* If a switch has been marked, make the switch
      and mark that a switch has been done: */
      rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
      switching = true;
      // Each time a switch is done, increase this count by 1:
      switchcount ++;      
    } else {
      /* If no switching has been done AND the direction is "asc",
      set the direction to "desc" and run the while loop again. */
      if (switchcount == 0 && dir == "asc") {
        dir = "desc";
        switching = true;
      }
    }
  }
}
</script>
{% endblock %}
