{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>配置管理</h2>
        <!-- 创建新文件按钮 -->
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createFileModal">
            <i class="fas fa-plus"></i> 新建配置文件
        </button>
    </div>

    <div class="row">
        {% for filename, content in files.items() %}
        <div class="col-md-4 mb-4">
            <div class="card-box h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="text-truncate" title="{{ filename }}">{{ filename }}</h5>
                    <div>
                        {% if filename not in ['url.txt', 'usernames.txt', 'passwords.txt'] %}
                        <form action="/config" method="post" class="d-inline" onsubmit="return confirm('确定要删除此文件吗？');">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="filename" value="{{ filename }}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>
                        </form>
                        {% endif %}
                    </div>
                </div>
                <form action="/config" method="post">
                    <input type="hidden" name="action" value="save">
                    <input type="hidden" name="filename" value="{{ filename }}">
                    <textarea class="form-control mb-3" name="content" rows="12" style="font-family: monospace; font-size: 0.85rem;">{{ content }}</textarea>
                    <button type="submit" class="btn btn-primary w-100">保存修改</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Modal: 创建新文件 -->
<div class="modal fade" id="createFileModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新建配置文件</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/config" method="post">
                <div class="modal-body">
                    <input type="hidden" name="action" value="create">
                    <div class="mb-3">
                        <label class="form-label">文件名 (必须以 .txt 结尾)</label>
                        <input type="text" class="form-control" name="new_filename" placeholder="example: custom_dict.txt" required pattern=".*\.txt$">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-success">创建</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
